version: "3.9"

services:
  backend:
    container_name: hotel-management-be
    image: hotel-management-be
    build:
      context: ./hotel-management-be
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/hotel-management?authSource=admin
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING}
    depends_on:
      - mongo

  frontend:
    container_name: hotel-management-fe
    image: hotel-management-fe
    build:
      context: ./hotel-management
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - INTERNAL_API_URL=${INTERNAL_API_URL}
      - NEXT_PUBLIC_APPINSIGHTS_CONNECTION_STRING=${NEXT_PUBLIC_APPINSIGHTS_CONNECTION_STRING}
    depends_on:
      - backend

  mongo:
    container_name: hotel-management-mongo
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: hotel-management
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: