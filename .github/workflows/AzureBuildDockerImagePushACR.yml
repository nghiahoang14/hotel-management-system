name: Build & Push Images to ACR

on:
  push:
    branches: ["main", "dev"]
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      run_number:
        required: true
        type: string
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true

jobs:
  test-fe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: hotel-management/package-lock.json

      - name: Install FE deps
        working-directory: hotel-management
        run: npm ci

      - name: Lint FE
        working-directory: hotel-management
        run: npm run lint --if-present

      - name: Test FE
        working-directory: hotel-management
        run: npm test --if-present

  test-be:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: hotel-management-be/package-lock.json

      - name: Install BE deps
        working-directory: hotel-management-be
        run: npm ci

      - name: Lint BE
        working-directory: hotel-management-be
        run: npm run lint --if-present

      - name: Test BE
        working-directory: hotel-management-be
        run: npm test --if-present

  build:
    needs: [test-fe, test-be]  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: hotelmanagementregistry123.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set ENV TAG
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"
          RUN_NUM="${{ inputs.run_number || github.run_number }}"
          [[ "$BRANCH" == "main" ]] && ENV_TAG=prod || ENV_TAG=dev
          echo "ENV_TAG=$ENV_TAG" >> $GITHUB_ENV
          echo "RUN_NUM=$RUN_NUM" >> $GITHUB_ENV

      - name: Build & Push BE + FE
        run: |
          BE_IMAGE=hotelmanagementregistry123.azurecr.io/hotelmanagementbe
          FE_IMAGE=hotelmanagementregistry123.azurecr.io/hotelmanagementfe

          docker build \
            -t $BE_IMAGE:$ENV_TAG-$RUN_NUM \
            -f hotel-management-be/Dockerfile hotel-management-be &

          docker build \
            --build-arg ENV_FILE=.env.$ENV_TAG \
            -t $FE_IMAGE:$ENV_TAG-$RUN_NUM \
            -f hotel-management/Dockerfile hotel-management &

          wait

          docker push $BE_IMAGE:$ENV_TAG-$RUN_NUM &
          docker push $FE_IMAGE:$ENV_TAG-$RUN_NUM &
          wait

          docker tag $BE_IMAGE:$ENV_TAG-$RUN_NUM $BE_IMAGE:$ENV_TAG
          docker tag $FE_IMAGE:$ENV_TAG-$RUN_NUM $FE_IMAGE:$ENV_TAG
          docker push $BE_IMAGE:$ENV_TAG &
          docker push $FE_IMAGE:$ENV_TAG &
          wait