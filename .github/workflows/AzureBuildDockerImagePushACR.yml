name: Build & Push Images to ACR

on:
  push:
    branches: ["main", "dev"]
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      run_number:
        required: true
        type: string
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true

jobs:
  # 1. TEST 
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            hotel-management/package-lock.json
            hotel-management-be/package-lock.json

      # ---------- FRONTEND ----------
      - name: Install FE deps
        working-directory: hotel-management
        run: npm install

      - name: Lint FE
        working-directory: hotel-management
        run: npm run lint --if-present

      - name: Test FE
        working-directory: hotel-management
        run: npm test --if-present

      - name: Build FE (check)
        working-directory: hotel-management
        run: npm run build

      # ---------- BACKEND ----------
      - name: Install BE deps
        working-directory: hotel-management-be
        run: npm ci

      - name: Lint BE
        working-directory: hotel-management-be
        run: npm run lint --if-present

      - name: Test BE
        working-directory: hotel-management-be
        run: npm test --if-present

  # =========================
  # 2. BUILD & PUSH DOCKER
  # =========================
  build:
    needs: test   # 👈 chỉ chạy khi test pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: hotelmanagementregistry123.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set ENV TAG
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "ENV_TAG=prod" >> $GITHUB_ENV
          else
            echo "ENV_TAG=dev" >> $GITHUB_ENV
          fi

      # ---------- BACKEND ----------
      - name: Build & Push Backend
        run: |
          RUN_NUM="${{ inputs.run_number || github.run_number }}"
          IMAGE=hotelmanagementregistry123.azurecr.io/hotelmanagementbe

          docker build \
            -t $IMAGE:$ENV_TAG-${RUN_NUM} \
            -f hotel-management-be/Dockerfile hotel-management-be

          docker push $IMAGE:$ENV_TAG-${RUN_NUM}

          docker tag $IMAGE:$ENV_TAG-${RUN_NUM} $IMAGE:$ENV_TAG
          docker push $IMAGE:$ENV_TAG

      # ---------- FRONTEND ----------
      - name: Build & Push Frontend
        run: |
          RUN_NUM="${{ inputs.run_number || github.run_number }}"
          IMAGE=hotelmanagementregistry123.azurecr.io/hotelmanagementfe

          docker build \
            --build-arg ENV_FILE=.env.$ENV_TAG \
            -t $IMAGE:$ENV_TAG-${RUN_NUM} \
            -f hotel-management/Dockerfile hotel-management

          docker push $IMAGE:$ENV_TAG-${RUN_NUM}

          docker tag $IMAGE:$ENV_TAG-${RUN_NUM} $IMAGE:$ENV_TAG
          docker push $IMAGE:$ENV_TAG