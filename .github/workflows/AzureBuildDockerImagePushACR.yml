name: Build & Push Images to ACR

on:
  push:
    branches: [ "main", "dev" ]
  workflow_call:        
    inputs:
      branch:
        required: true
        type: string
      run_number:
        required: true
        type: string
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to ACR
      uses: azure/docker-login@v1
      with:
        login-server: hotelmanagementregistry123.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Set ENV TAG
      run: |
        BRANCH="${{ inputs.branch || github.ref_name }}"
        if [[ "$BRANCH" == "main" ]]; then
          echo "ENV_TAG=prod" >> $GITHUB_ENV
        else
          echo "ENV_TAG=dev" >> $GITHUB_ENV
        fi

    - name: Build & Push Backend
      run: |
        RUN_NUM="${{ inputs.run_number || github.run_number }}"
        IMAGE=hotelmanagementregistry123.azurecr.io/hotelmanagementbe
        docker build -t $IMAGE:$ENV_TAG-${RUN_NUM} -f hotel-management-be/Dockerfile hotel-management-be
        docker push $IMAGE:$ENV_TAG-${RUN_NUM}
        docker tag $IMAGE:$ENV_TAG-${RUN_NUM} $IMAGE:$ENV_TAG
        docker push $IMAGE:$ENV_TAG

    - name: Build & Push Frontend
      run: |
        RUN_NUM="${{ inputs.run_number || github.run_number }}"
        IMAGE=hotelmanagementregistry123.azurecr.io/hotelmanagementfe
        docker build --build-arg ENV_FILE=.env.$ENV_TAG -t $IMAGE:$ENV_TAG-${RUN_NUM} -f hotel-management/Dockerfile hotel-management
        docker push $IMAGE:$ENV_TAG-${RUN_NUM}
        docker tag $IMAGE:$ENV_TAG-${RUN_NUM} $IMAGE:$ENV_TAG
        docker push $IMAGE:$ENV_TAG