name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Môi trường cần rollback'
        required: true
        type: choice
        options: [dev, prod]
      build_number:
        description: 'Build number muốn rollback về (vd: 21, 22, 23)'
        required: true
      reason:
        description: 'Lý do rollback'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set app names
      run: |
        if [[ "${{ inputs.environment }}" == "prod" ]]; then
          echo "FE_APP=hotelmanagement-fe-prod" >> $GITHUB_ENV
          echo "BE_APP=hotelmanagement-be-prod" >> $GITHUB_ENV
        else
          echo "FE_APP=hotelmanagement-fe" >> $GITHUB_ENV
          echo "BE_APP=hotelmanagement-be" >> $GITHUB_ENV
        fi

    - name: Activate & shift traffic Backend
      run: |
        TARGET="${BE_APP}--build-${{ inputs.build_number }}"

        az containerapp revision activate \
          --name $BE_APP \
          --resource-group hotel-management-rg \
          --revision $TARGET

        az containerapp ingress traffic set \
          --name $BE_APP \
          --resource-group hotel-management-rg \
          --revision-weight $TARGET=100

        echo "BE rolled back to: $TARGET"

    - name: Activate & shift traffic Frontend
      run: |
        TARGET="${FE_APP}--build-${{ inputs.build_number }}"

        az containerapp revision activate \
          --name $FE_APP \
          --resource-group hotel-management-rg \
          --revision $TARGET

        az containerapp ingress traffic set \
          --name $FE_APP \
          --resource-group hotel-management-rg \
          --revision-weight $TARGET=100

        echo "FE rolled back to: $TARGET"