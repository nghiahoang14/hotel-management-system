name: Deploy to Azure Container Apps

on:
  workflow_run:
    workflows: ["Build & Push Images to ACR"]
    types:
      - completed
    branches:
      - main
      - dev 

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'dev') }}
    outputs:
      be_revision: ${{ steps.deploy_be.outputs.be_revision }}
      fe_revision: ${{ steps.deploy_fe.outputs.fe_revision }}

    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set ENV + APP NAME
      run: |
        echo "BRANCH=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV
        echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

        if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
          echo "ENV_TAG=prod" >> $GITHUB_ENV
          echo "FE_APP=hotelmanagement-fe-prod" >> $GITHUB_ENV
          echo "BE_APP=hotelmanagement-be-prod" >> $GITHUB_ENV
        else
          echo "ENV_TAG=dev" >> $GITHUB_ENV
          echo "FE_APP=hotelmanagement-fe" >> $GITHUB_ENV
          echo "BE_APP=hotelmanagement-be" >> $GITHUB_ENV
        fi
    - name: Deploy Backend
      id: deploy_be
      run: |
        az containerapp update \
          --name $BE_APP \
          --resource-group hotel-management-rg \
          --image hotelmanagementregistry123.azurecr.io/hotelmanagementbe:$IMAGE_TAG \
          --revision-suffix build-${IMAGE_TAG:0:7}

        BE_REV=$(az containerapp revision list \
          --name $BE_APP \
          --resource-group hotel-management-rg \
          --query "[0].name" -o tsv)

        echo "be_revision=$BE_REV" >> $GITHUB_OUTPUT
    - name: Deploy Frontend
      id: deploy_fe
      run: |
        az containerapp update \
          --name $FE_APP \
          --resource-group hotel-management-rg \
          --image hotelmanagementregistry123.azurecr.io/hotelmanagementfe:$IMAGE_TAG \
          --revision-suffix build-${IMAGE_TAG:0:7}

        FE_REV=$(az containerapp revision list \
          --name $FE_APP \
          --resource-group hotel-management-rg \
          --query "[0].name" -o tsv)

        echo "fe_revision=$FE_REV" >> $GITHUB_OUTPUT
    - name: Health check Backend revision
      run: |
        for i in 1 2 3 4 5; do
          sleep 20
          STATE=$(az containerapp revision show \
            --name $BE_APP \
            --resource-group hotel-management-rg \
            --revision ${{ steps.deploy_be.outputs.be_revision }} \
            --query "properties.healthState" -o tsv)

          echo "BE attempt $i: $STATE"
          if [ "$STATE" = "Healthy" ]; then exit 0; fi
        done
        echo "Backend unhealthy after 5 attempts"
        exit 1

    - name: Health check Frontend revision
      run: |
        for i in 1 2 3 4 5; do
          sleep 15
          STATE=$(az containerapp revision show \
            --name $FE_APP \
            --resource-group hotel-management-rg \
            --revision ${{ steps.deploy_fe.outputs.fe_revision }} \
            --query "properties.healthState" -o tsv)

          echo "FE attempt $i: $STATE"
          if [ "$STATE" = "Healthy" ]; then exit 0; fi
        done
        echo "Frontend unhealthy after 5 attempts"
        exit 1

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set app names
      run: |
        if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
          echo "FE_APP=hotelmanagement-fe-prod" >> $GITHUB_ENV
          echo "BE_APP=hotelmanagement-be-prod" >> $GITHUB_ENV
        else
          echo "FE_APP=hotelmanagement-fe" >> $GITHUB_ENV
          echo "BE_APP=hotelmanagement-be" >> $GITHUB_ENV
        fi
    - name: Deactivate failed BE revision
      if: ${{ needs.deploy.outputs.be_revision != '' }}
      run: |
        az containerapp revision deactivate \
          --name $BE_APP \
          --resource-group hotel-management-rg \
          --revision ${{ needs.deploy.outputs.be_revision }}
        echo "Rolled back BE: ${{ needs.deploy.outputs.be_revision }}"

    - name: Deactivate failed FE revision
      if: ${{ needs.deploy.outputs.fe_revision != '' }}
      run: |
        az containerapp revision deactivate \
          --name $FE_APP \
          --resource-group hotel-management-rg \
          --revision ${{ needs.deploy.outputs.fe_revision }}
        echo "Rolled back FE: ${{ needs.deploy.outputs.fe_revision }}"